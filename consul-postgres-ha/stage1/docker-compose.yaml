# stage-1 worker — runs mesh-conn (UDP port-forwarder over ICE) plus a
# netshoot tester sidecar to poke the forwarder. Each CVM in the cluster
# uses the same compose; PEER_ID + PEERS_JSON differ per deployment.
#
# Each peer has a unique identity port (in PEERS_JSON). On every host:
#   - the local app binds 127.0.0.1:<own_port>
#   - mesh-conn binds 127.0.0.1:<other_peer_port> for every other peer
#   - apps reach peer X by sending UDP to 127.0.0.1:<X_port>

services:
  mesh-conn:
    image: ${MESH_CONN_IMAGE}
    restart: on-failure
    network_mode: host         # required: docker-bridge NAT breaks srflx
                               # hole-punch and forces ICE onto TURN-relay
    environment:
      - PEER_ID=${PEER_ID}
      - PEERS_JSON=${PEERS_JSON}
      - SIGNALING_URL=${SIGNALING_URL}
      - TURN_HOST=${TURN_HOST}
      - TURN_SHARED_SECRET=${TURN_SHARED_SECRET}

  tester:
    image: nicolaka/netshoot:latest
    network_mode: host
    command: ["sleep", "infinity"]
    depends_on:
      - mesh-conn
