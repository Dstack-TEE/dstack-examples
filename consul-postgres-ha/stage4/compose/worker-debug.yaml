# Debug-only worker compose. Strips everything except bootstrap-secrets
# + a sleeper. If this won't boot, the platform layer (dstack-sock,
# image pull, env passing) is at fault. If it boots, layer back the
# real services one at a time.

services:
  bootstrap-secrets:
    image: ${BOOTSTRAP_SECRETS_IMAGE}
    network_mode: host
    restart: "no"
    environment:
      - CLUSTER_NAME=${CLUSTER_NAME}
      - ROLE=worker
      - PROTOCOL_BASES=${PROTOCOL_BASES}
      - WORKER_ORDINAL=${WORKER_ORDINAL}
      - EXPECTED_REPLICAS=${EXPECTED_REPLICAS}
      - CONSUL_HTTP_ADDR=127.0.0.1:${COORDINATOR_HTTP_PORT}
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock:ro
      - /tmp/dstack-runtime/secrets:/run/secrets
      - /tmp/dstack-runtime/instance:/run/instance

  sleeper:
    image: alpine:3.19
    network_mode: host
    restart: unless-stopped
    command: ["sh", "-c", "echo SLEEPING; sleep infinity"]
    depends_on:
      bootstrap-secrets:
        condition: service_completed_successfully
