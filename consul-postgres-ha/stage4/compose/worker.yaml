# Stage 4 — worker compose template.
#
# A "worker" CVM bundles:
#   - bootstrap-secrets  (init container)
#   - mesh-conn          (UDP+TCP port-forwarder)
#   - consul agent       (client, joins via mesh-conn → coordinator)
#   - webdemo            (the actual workload — example service)
#   - sidecar            (Envoy, for Consul Connect mTLS)
#   - tester             (netshoot)

services:
  # Keepalive holds the CVM up regardless of bootstrap-secrets / consul /
  # mesh-conn / sidecar success. Without it, dstack tears the CVM down
  # the moment any service in the dependency tree fails — and we lose
  # the ability to SSH in and diagnose. Removable once the stack is
  # known-good.
  keepalive:
    image: alpine:3.19
    network_mode: host
    restart: unless-stopped
    command: ["sh", "-c", "echo KEEPALIVE; sleep infinity"]

  bootstrap-secrets:
    image: ${BOOTSTRAP_SECRETS_IMAGE}
    network_mode: host
    restart: "no"
    environment:
      - CLUSTER_NAME=${CLUSTER_NAME}
      - ROLE=worker
      - PROTOCOL_BASES=${PROTOCOL_BASES}
      - WORKER_ORDINAL=${WORKER_ORDINAL}
      - EXPECTED_REPLICAS=${EXPECTED_REPLICAS}
      # COORDINATOR_HTTP_PORTS is comma-separated; bootstrap-secrets
      # picks the first reachable one to talk to Consul KV (only used
      # if WORKER_ORDINAL is unset, which it isn't with the per-worker
      # phala_app pattern — kept for the legacy CAS-claim fallback).
      - COORDINATOR_HTTP_PORTS=${COORDINATOR_HTTP_PORTS}
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock:ro
      - /tmp/dstack-runtime/secrets:/run/secrets
      - /tmp/dstack-runtime/instance:/run/instance

  mesh-conn:
    image: ${MESH_CONN_IMAGE}
    network_mode: host
    restart: on-failure
    environment:
      - PEERS_JSON=${PEERS_JSON}
      - SIGNALING_URL=${SIGNALING_URL}
      - TURN_HOST=${TURN_HOST}
      - TURN_SHARED_SECRET=${TURN_SHARED_SECRET}
      # MESH_CONN_RELAY_ONLY=1 forces ICE to gather only Relay candidates,
      # routing all peer traffic through the coturn server. Trade-off:
      # adds the Vultr round-trip to every peer hop, but avoids the
      # direct-pair connectivity-check failures we hit between dstack
      # workers (host/srflx/prflx pairs never establish, while relay
      # always works). Set when DIRECT_FAILS_FOR_THIS_DEPLOYMENT.
      - MESH_CONN_RELAY_ONLY=${MESH_CONN_RELAY_ONLY:-}
      # MESH_CONN_TCP_ONLY=1 restricts ICE to TCP candidates only. The
      # underlying conn becomes a TCP byte stream that yamux can survive
      # on (UDP loss kills yamux keepalives — proven by trace at
      # 268KB pg_basebackup transfers).
      - MESH_CONN_TCP_ONLY=${MESH_CONN_TCP_ONLY:-}
    volumes:
      - /tmp/dstack-runtime/secrets:/run/secrets:ro
      - /tmp/dstack-runtime/instance:/run/instance:ro
    depends_on:
      bootstrap-secrets:
        condition: service_completed_successfully

  consul:
    image: hashicorp/consul:1.19
    network_mode: host
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        SERF=$$(jq -r '.ports.serf_lan'   /run/instance/info.json)
        RPC=$$(jq -r  '.ports.server_rpc' /run/instance/info.json)
        HTTP=$$(jq -r '.ports.http_api'   /run/instance/info.json)
        GRPC=$$(jq -r '.ports.grpc'       /run/instance/info.json)
        # Workers retry-join EVERY coordinator's serf port (mesh-conn
        # forwards each one to its actual coordinator). Consul's serf
        # gossip then connects via whichever join succeeds first.
        RETRYJOIN=""
        for p in $$(echo "${COORDINATOR_SERF_PORTS}" | tr ',' ' '); do
          RETRYJOIN="$$RETRYJOIN -retry-join=127.0.0.1:$$p"
        done
        exec consul agent \
          -node=$$(jq -r '.role + "-" + (.ordinal|tostring)' /run/instance/info.json) \
          -datacenter=${CLUSTER_NAME} \
          -bind=127.0.0.1 -advertise=127.0.0.1 -client=127.0.0.1 \
          -serf-lan-port=$$SERF \
          -server-port=$$RPC \
          -http-port=$$HTTP \
          -grpc-port=$$GRPC \
          -dns-port=-1 \
          $$RETRYJOIN \
          -data-dir=/consul/data \
          -hcl='connect { enabled = true }' \
          -log-level=INFO
    volumes:
      - consul-data:/consul/data
      - /tmp/dstack-runtime/secrets:/run/secrets:ro
      - /tmp/dstack-runtime/instance:/run/instance:ro
    depends_on:
      bootstrap-secrets:
        condition: service_completed_successfully
      mesh-conn:
        condition: service_started

  webdemo:
    image: ${WEBDEMO_IMAGE}
    network_mode: host
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        export PEER_ID=$$(jq -r '.role + "-" + (.ordinal|tostring)' /run/instance/info.json)
        export WEBDEMO_PORT=$$(jq -r '.ports.webdemo'         /run/instance/info.json)
        export SIDECAR_PORT=$$(jq -r '.ports.sidecar_public'  /run/instance/info.json)
        export CONSUL_HTTP_ADDR=127.0.0.1:$$(jq -r '.ports.http_api' /run/instance/info.json)
        exec webdemo
    volumes:
      - /tmp/dstack-runtime/instance:/run/instance:ro
    depends_on: [consul]

  sidecar:
    image: ${SIDECAR_IMAGE}
    network_mode: host
    restart: on-failure
    command:
      - |
        set -e
        PEER_ID=$$(jq -r '.role + "-" + (.ordinal|tostring)' /run/instance/info.json)
        HTTP_PORT=$$(jq -r '.ports.http_api' /run/instance/info.json)
        GRPC_PORT=$$(jq -r '.ports.grpc'    /run/instance/info.json)
        ORDINAL=$$(jq -r '.ordinal'         /run/instance/info.json)
        ADMIN_PORT=$$((19100 + ORDINAL))
        until consul connect envoy \
                -sidecar-for=webdemo-$$PEER_ID \
                -admin-bind=127.0.0.1:$$ADMIN_PORT \
                -bootstrap \
                -http-addr=127.0.0.1:$$HTTP_PORT \
                -grpc-addr=127.0.0.1:$$GRPC_PORT \
                > /tmp/envoy-bootstrap.json 2>/dev/null; do
          echo "waiting for sidecar registration..."; sleep 3
        done
        exec envoy -c /tmp/envoy-bootstrap.json -l info
    volumes:
      - /tmp/dstack-runtime/instance:/run/instance:ro
    depends_on: [webdemo]

  patroni:
    image: ${PATRONI_IMAGE}
    network_mode: host
    restart: on-failure
    # CLUSTER_NAME drives Patroni's `scope` — every peer's patroni
    # must use the same value to land in the same cluster. The rest
    # is read from /run/instance/info.json by entrypoint.sh.
    environment:
      - CLUSTER_NAME=${CLUSTER_NAME}
    volumes:
      - /tmp/dstack-runtime/instance:/run/instance:ro
      - /tmp/dstack-runtime/secrets:/run/secrets:ro
      - patroni-pgdata:/var/lib/patroni
    depends_on:
      consul:
        condition: service_started
      bootstrap-secrets:
        condition: service_completed_successfully

  tester:
    image: nicolaka/netshoot:latest
    network_mode: host
    command: ["sleep", "infinity"]
    depends_on: [mesh-conn, consul, webdemo, patroni]

volumes:
  consul-data:
  patroni-pgdata:

# Shared state goes through HOST BIND MOUNTS, not named docker
# volumes. See coordinator.yaml for the full note — short version:
# named docker volumes don't share data across containers on the
# dstack platform we run on. Bind mounts to /tmp work fine.
