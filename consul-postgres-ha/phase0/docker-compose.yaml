# Phase-0 ICE peer.
#
# Deploy two of these as separate dstack CVMs. Use distinct PEER_ID values
# (e.g. "peer-a" and "peer-b") and set PARTNER_ID to the other one. Both
# CVMs share the same SIGNALING_URL, TURN_HOST and TURN_SHARED_SECRET
# (the public coordinator host).
#
# Read the logs:
#   phala cvm logs <id>
# Look for "CONNECTED via <local-type> <-> <remote-type>" and the rtt= lines.

services:
  icetest:
    image: ${ICETEST_IMAGE}
    restart: on-failure
    network_mode: host
    environment:
      - PEER_ID=${PEER_ID}
      - PARTNER_ID=${PARTNER_ID}
      - SIGNALING_URL=${SIGNALING_URL}
      - TURN_HOST=${TURN_HOST}
      - TURN_SHARED_SECRET=${TURN_SHARED_SECRET}
    command: ["-mode=peer"]
