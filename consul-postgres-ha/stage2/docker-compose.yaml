# stage-2 — Consul cluster over the mesh-conn port-forwarder.
#
# Each peer runs:
#   - mesh-conn: forwards 4 ports per other peer (serf-LAN, RPC, HTTP, gRPC)
#   - consul:    one agent per peer; ctrl is server (-server -bootstrap-expect=1),
#                workers are clients
#   - tester:    netshoot for poking the cluster
#
# Per-peer port plan (PEER index i in {0:ctrl, 1:w1, 2:w2, 3:w3}):
#   serf_lan = 18000 + i      (UDP+TCP gossip)
#   server   = 18100 + i      (TCP RPC)
#   http     = 18200 + i      (TCP HTTP API)
#   grpc     = 18300 + i      (TCP gRPC/xDS)
#
# Apps reach peer X on protocol P via 127.0.0.1:<X.<P>_port> — the same
# convention as the bare port-forwarder demo, just with 4 ports per peer.

services:
  mesh-conn:
    image: ${MESH_CONN_IMAGE}
    restart: on-failure
    network_mode: host
    environment:
      - PEER_ID=${PEER_ID}
      - PEERS_JSON=${PEERS_JSON}
      - SIGNALING_URL=${SIGNALING_URL}
      - TURN_HOST=${TURN_HOST}
      - TURN_SHARED_SECRET=${TURN_SHARED_SECRET}

  consul:
    image: hashicorp/consul:1.19
    restart: unless-stopped
    network_mode: host
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ "$$ROLE" = "server" ]; then
          MODE_FLAGS="-server -bootstrap-expect=1 -ui"
        else
          MODE_FLAGS="-retry-join=127.0.0.1:$$CTRL_SERF_LAN_PORT"
        fi
        # NOTE: -client binds the HTTP/RPC/gRPC client interfaces. We bind to
        # 127.0.0.1 only — apps on this host reach the local agent there;
        # peer agents reach this agent's RPC/HTTP via the overlay.
        exec consul agent \
          -node=$$PEER_ID \
          -datacenter=dstack-mesh \
          -bind=127.0.0.1 \
          -advertise=127.0.0.1 \
          -client=127.0.0.1 \
          -serf-lan-port=$$SERF_LAN_PORT \
          -server-port=$$SERVER_PORT \
          -http-port=$$HTTP_PORT \
          -grpc-port=$$GRPC_PORT \
          -dns-port=-1 \
          -data-dir=/consul/data \
          -log-level=INFO \
          $$MODE_FLAGS
    environment:
      - PEER_ID=${PEER_ID}
      - ROLE=${ROLE}
      - SERF_LAN_PORT=${SERF_LAN_PORT}
      - SERVER_PORT=${SERVER_PORT}
      - HTTP_PORT=${HTTP_PORT}
      - GRPC_PORT=${GRPC_PORT}
      - CTRL_SERF_LAN_PORT=${CTRL_SERF_LAN_PORT}
    volumes:
      - consul-data:/consul/data
    depends_on:
      - mesh-conn

  tester:
    image: nicolaka/netshoot:latest
    network_mode: host
    command: ["sleep", "infinity"]
    depends_on:
      - mesh-conn
      - consul

volumes:
  consul-data:
